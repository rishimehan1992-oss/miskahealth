name: MISKA SEO Agent

on:
  schedule:
    # 06:00 IST = 00:30 UTC
    - cron: "30 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  seo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Technical audit
        run: node scripts/seo-audit.mjs --live

      - name: Keyword rank check
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
        run: node scripts/seo-rank-check.mjs

      - name: Commit reports
        run: |
          git config user.name "miska-seo-agent"
          git config user.email "seo-agent@miskahealth.in"
          git add seo/reports/ seo/rank-history.json
          if git diff --staged --quiet; then
            echo "No report changes"
          else
            git commit -m "seo: daily audit and rank snapshot"
            git push
          fi
